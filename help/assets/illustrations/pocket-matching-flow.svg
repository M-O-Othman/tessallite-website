<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 560" font-family="Inter, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#006C35"/>
    </marker>
    <marker id="arrow-gold" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#D4AF37"/>
    </marker>
    <marker id="arrow-dash" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#6B7280"/>
    </marker>
  </defs>

  <text x="440" y="24" fill="#006C35" font-size="15" font-weight="700" dominant-baseline="middle" text-anchor="middle">Pocket Matching &amp; Identity</text>

  <!-- Identity block (top-left) -->
  <rect x="30" y="48" width="360" height="116" rx="10" fill="#F2F7F4" stroke="#006C35" stroke-width="1.5"/>
  <text x="210" y="68" fill="#006C35" font-size="12" font-weight="700" dominant-baseline="middle" text-anchor="middle">Pocket identity (unique per row)</text>
  <text x="50" y="92" fill="#333333" font-size="12" font-weight="600">model_id</text>
  <text x="200" y="92" fill="#6B7280" font-size="11">the model this pocket belongs to</text>
  <text x="50" y="114" fill="#333333" font-size="12" font-weight="600">query_fingerprint</text>
  <text x="200" y="114" fill="#6B7280" font-size="11">shape of the defining SQL</text>
  <text x="50" y="136" fill="#333333" font-size="12" font-weight="600">predicate_set_hash</text>
  <text x="200" y="136" fill="#6B7280" font-size="11">canonical hash of the filter set</text>
  <text x="50" y="156" fill="#6B7280" font-size="11">A second pocket with the same identity → HTTP 409.</text>

  <!-- Incoming query block (top-right) -->
  <rect x="420" y="48" width="430" height="116" rx="10" fill="#F2F7F4" stroke="#006C35" stroke-width="1.5"/>
  <text x="635" y="68" fill="#006C35" font-size="12" font-weight="700" dominant-baseline="middle" text-anchor="middle">Queries a SELECT * pocket can serve</text>
  <text x="438" y="92" fill="#333333" font-size="11" font-weight="600">Exact shape</text>
  <text x="438" y="108" fill="#6B7280" font-size="11">SELECT * FROM model WHERE amount &gt; 4970</text>
  <text x="438" y="128" fill="#333333" font-size="11" font-weight="600">Aggregate over pocket slice</text>
  <text x="438" y="144" fill="#6B7280" font-size="11">SELECT COUNT(*) FROM model WHERE amount &gt; 4970</text>
  <text x="438" y="160" fill="#6B7280" font-size="11" font-style="italic">Identity-derived: SELECT … FROM (SELECT * FROM model …) q</text>

  <!-- Matcher -->
  <rect x="340" y="210" width="200" height="50" rx="10" fill="#EFF7F3" stroke="#006C35" stroke-width="2"/>
  <text x="440" y="230" fill="#333333" font-size="13" font-weight="700" dominant-baseline="middle" text-anchor="middle">Pocket Matcher</text>
  <text x="440" y="248" fill="#6B7280" font-size="11" dominant-baseline="middle" text-anchor="middle">fingerprint + predicate subset</text>

  <!-- Incoming arrow -->
  <line x1="440" y1="166" x2="440" y2="208" stroke="#006C35" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="490" y="188" fill="#6B7280" font-size="11" dominant-baseline="middle" text-anchor="middle">bound query</text>

  <!-- HIT branch -->
  <line x1="380" y1="260" x2="300" y2="310" stroke="#006C35" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="310" y="280" fill="#006C35" font-size="11" font-weight="600" dominant-baseline="middle" text-anchor="middle">Hit</text>

  <rect x="180" y="310" width="230" height="44" rx="10" fill="#EFF7F3" stroke="#006C35" stroke-width="2"/>
  <text x="295" y="332" fill="#333333" font-size="13" font-weight="600" dominant-baseline="middle" text-anchor="middle">Rewrite against pocket table</text>

  <line x1="295" y1="354" x2="295" y2="396" stroke="#006C35" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <rect x="180" y="398" width="230" height="44" rx="10" fill="#EFF7F3" stroke="#006C35" stroke-width="2"/>
  <text x="295" y="420" fill="#333333" font-size="13" font-weight="600" dominant-baseline="middle" text-anchor="middle">route_type = pocket</text>

  <!-- SKIP branch -->
  <line x1="500" y1="260" x2="580" y2="310" stroke="#D4AF37" stroke-width="2" fill="none" marker-end="url(#arrow-gold)"/>
  <text x="570" y="280" fill="#D4AF37" font-size="11" font-weight="600" dominant-baseline="middle" text-anchor="middle">Skip</text>

  <rect x="470" y="310" width="380" height="200" rx="10" fill="#FDF8E6" stroke="#D4AF37" stroke-width="1.5"/>
  <text x="660" y="330" fill="#B8860B" font-size="12" font-weight="700" dominant-baseline="middle" text-anchor="middle">Skip reasons written to route_logs</text>
  <text x="488" y="354" fill="#333333" font-size="11" font-weight="600">flag_disabled</text>
  <text x="640" y="354" fill="#6B7280" font-size="11">pocket.enabled is off</text>
  <text x="488" y="374" fill="#333333" font-size="11" font-weight="600">model_disabled</text>
  <text x="640" y="374" fill="#6B7280" font-size="11">pocket.model_enabled is off for this model</text>
  <text x="488" y="394" fill="#333333" font-size="11" font-weight="600">no_tenant_filter</text>
  <text x="640" y="394" fill="#6B7280" font-size="11">no tenant-scope column in the query</text>
  <text x="488" y="414" fill="#333333" font-size="11" font-weight="600">no_candidates</text>
  <text x="640" y="414" fill="#6B7280" font-size="11">no fresh pocket for this model</text>
  <text x="488" y="434" fill="#333333" font-size="11" font-weight="600">fingerprint_or_predicate_mismatch</text>
  <text x="720" y="434" fill="#6B7280" font-size="11">shape or slice does not fit</text>
  <text x="488" y="454" fill="#333333" font-size="11" font-weight="600">rewrite_unsafe</text>
  <text x="640" y="454" fill="#6B7280" font-size="11">match found but rewrite produced no change</text>
  <text x="488" y="474" fill="#333333" font-size="11" font-weight="600">complex_sql / unresolvable_where</text>
  <text x="720" y="474" fill="#6B7280" font-size="11">query cannot be bound safely</text>
  <text x="488" y="498" fill="#6B7280" font-size="11" font-style="italic">Visible in the Diagnostics panel under Route reason.</text>

  <!-- Down-merge arrow to aggregate/source fallback -->
  <line x1="660" y1="510" x2="660" y2="536" stroke="#6B7280" stroke-width="2" fill="none" stroke-dasharray="5,4" marker-end="url(#arrow-dash)"/>
  <text x="660" y="548" fill="#6B7280" font-size="11" dominant-baseline="middle" text-anchor="middle">fall through to aggregate, then source</text>
</svg>
